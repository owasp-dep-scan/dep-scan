name: Upload depscan Package and Container image

on:
  schedule:
    - cron: "0 4 * * *"
  push:
    paths-ignore:
      - '**/README.md'
      - 'dockertests.yml'
      - 'pythonapp.yml'
      - 'gobintests.yml'
    branches:
      - master
      - release/*
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NYDUS_VERSION: v2.3.1
  NYDUS_STATIC_AMD64_SHA256: bd0cac0785572b2d8af1b4f97f9272713356fbc0c8e0770b23cfc8ea0e3920ae

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: '3.12'
          enable-cache: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24.x'
          package-manager-cache: false
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - name: Build
        run: |
          uv build --all-packages
          ls -lh dist
      - name: Publish package distributions to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          uv publish --trusted-publishing always

  build-images:
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: default-amd64
            arch: amd64
            dockerfile: Dockerfile
            images: |
              ghcr.io/${{ github.repository }}
              ghcr.io/owasp-dep-scan/depscan
          - id: default-arm64
            arch: arm64
            runner-suffix: -arm
            dockerfile: Dockerfile
            images: |
              ghcr.io/${{ github.repository }}
              ghcr.io/owasp-dep-scan/depscan
          - id: al9-amd64
            arch: amd64
            dockerfile: Dockerfile.al9
            images: |
              ghcr.io/owasp-dep-scan/depscan-al9
              ghcr.io/owasp-dep-scan/dep-scan-al9
          - id: al9-arm64
            arch: arm64
            runner-suffix: -arm
            dockerfile: Dockerfile.al9
            images: |
              ghcr.io/owasp-dep-scan/depscan-al9
              ghcr.io/owasp-dep-scan/dep-scan-al9
    runs-on: ubuntu-24.04${{ matrix.image.runner-suffix }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ matrix.image.images }}
          flavor: latest=false,suffix=-${{ matrix.image.arch }}
      - name: Build and push Docker images
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        id: build
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/${{ matrix.image.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=depscan
          cache-to: type=gha,mode=max,scope=depscan

  deploy-manifest:
    needs: [build-images]
    strategy:
      fail-fast: false
      matrix:
        image:
          - id: default
            images: |
              ghcr.io/${{ github.repository }}
              ghcr.io/owasp-dep-scan/depscan
          - id: al9
            images: |
              ghcr.io/owasp-dep-scan/depscan-al9
              ghcr.io/owasp-dep-scan/dep-scan-al9
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        id: metadata
        with:
          images: ${{ matrix.image.images }}
      - name: Define Sources
        id: sources
        run: |
          FIRST_TAG=$(echo "${STEPS_METADATA_OUTPUTS_TAGS}" | head -n 1)
          echo "amd64_source=${FIRST_TAG}-amd64" >> $GITHUB_OUTPUT
          echo "arm64_source=${FIRST_TAG}-arm64" >> $GITHUB_OUTPUT
        env:
          STEPS_METADATA_OUTPUTS_TAGS: ${{ steps.metadata.outputs.tags }}
      - uses: int128/docker-manifest-create-action@7df7f9e221d927eaadf87db231ddf728047308a4  # v2.19.0
        with:
          index-annotations: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
          sources: |
            ${{ steps.sources.outputs.amd64_source }}
            ${{ steps.sources.outputs.arm64_source }}

  post-process:
    needs: [deploy-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24.x'
          package-manager-cache: false
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SBOM with cdxgen
        run: |
          npm install -g @cyclonedx/cdxgen
          cdxgen -t python -o bom.json . --profile research
          cdxgen -t docker -o depscan-oci-image.cdx.json ghcr.io/owasp-dep-scan/depscan:latest
      - name: Attach sbom to the image
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        run: |
          oras attach --artifact-type sbom/cyclonedx ghcr.io/owasp-dep-scan/depscan:latest ./depscan-oci-image.cdx.json:application/json
          oras discover --format tree ghcr.io/owasp-dep-scan/depscan:latest
      - name: Create Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            bom.json
            depscan-oci-image.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup nydus
        run: |
          NYDUS_ARCHIVE="nydus-static-${NYDUS_VERSION}-linux-amd64.tgz"
          curl -LO "https://github.com/dragonflyoss/nydus/releases/download/${NYDUS_VERSION}/${NYDUS_ARCHIVE}"
          echo "${NYDUS_STATIC_AMD64_SHA256}  ${NYDUS_ARCHIVE}" | sha256sum -c -
          tar -xvf "${NYDUS_ARCHIVE}"
          chmod +x nydus-static/*
          mv nydus-static/* /usr/local/bin/
          rm -rf "${NYDUS_ARCHIVE}" nydus-static
      - name: nydusify
        run: |
          nydusify convert --oci --oci-ref --source ghcr.io/owasp-dep-scan/depscan:master --target ghcr.io/owasp-dep-scan/depscan:master-nydus --prefetch-dir /opt/dep-scan
          nydusify check --target ghcr.io/owasp-dep-scan/depscan:master-nydus
          nydusify convert --oci --oci-ref --source ghcr.io/owasp-dep-scan/dep-scan:master --target ghcr.io/owasp-dep-scan/dep-scan:master-nydus --prefetch-dir /opt/dep-scan
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
