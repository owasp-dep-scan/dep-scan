name: Python matrix CI

on:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build:
    env:
      VDB_DATABASE_URL: "ghcr.io/appthreat/vdbxz-app-2y:v6.5.x"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '24.x'
        package-manager-cache: false
    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Trim CI agent
      run: |
        chmod +x contrib/free_disk_space.sh
        ./contrib/free_disk_space.sh
    - name: Install dependencies
      run: |
        uv sync --all-extras --all-packages --dev
        npm install -g @cyclonedx/cdxgen
    - name: Test with pytest
      run: |
        uv run pytest --cov=depscan test
        uv run depscan --config .config/depscan-dev.toml
      env:
        SCAN_DEBUG_MODE: debug
    - name: purl tests
      run: |
        uv run depscan --purl "pkg:pypi/requests@2.32.1"
        uv run depscan --purl "pkg:pypi/requests@4.0.0"
        uv run depscan --purl "pkg:pypi/reqwestss@0.1.0"
        uv run depscan --purl "pkg:npm/%40appthreat/cdxgen@7.0.5"
        uv run depscan --purl "pkg:npm/%40appthreat/cdxgen@7.1.0"
        uv run depscan --purl "pkg:npm/fsevents@1.2.10"
        uv run depscan --purl "pkg:npm/@biomejs/biome@1.8.1"
      env:
        PYTHONIOENCODING: utf-8
    - name: Custom data tests
      run: |
        mkdir -p custom_vulns
        cat > custom_vulns/private.yaml <<EOF
        dataType: CVE_RECORD
        dataVersion: "5.2"
        cveMetadata:
          cveId: PRIVATE-DEPSCAN-TEST
          assignerOrgId: 00000000-0000-4000-8000-000000000000
          state: PUBLISHED
          datePublished: "2024-01-01T00:00:00Z"
          dateUpdated: "2024-01-01T00:00:00Z"
        containers:
          cna:
            providerMetadata:
              orgId: 00000000-0000-4000-8000-000000000000
            descriptions:
              - lang: en
                value: "Depscan Test Vulnerability"
            affected:
              - vendor: internal
                product: custom-test
                packageName: custom-test
                packageURL: pkg:pypi/custom-test
                versions:
                  - version: "1.0.0"
                    status: affected
                    versionType: semver
        EOF

        uv run depscan --purl "pkg:pypi/custom-test@1.0.0" --custom-data custom_vulns
      if: ${{ matrix.os == 'ubuntu-latest' }}
      env:
        PYTHONIOENCODING: utf-8

  devenv:
    env:
      VDB_DATABASE_URL: "ghcr.io/appthreat/vdbxz-app-2y:v6.5.x"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-26]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Trim CI agent
      run: |
        chmod +x contrib/free_disk_space.sh
        ./contrib/free_disk_space.sh
    - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f  # v31.10.5
    - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c  # v17
      with:
        name: devenv
    - name: Install devenv.sh
      run: nix profile install nixpkgs#devenv
    - name: Build the devenv shell
      run: |
        mkdir -p $HOME/.local/share/pnpm/global
        echo "$HOME/.local/share/pnpm/global" >> $GITHUB_PATH
        devenv test
    - name: Run pytest with uv
      run: |
        devenv shell uv run pytest --cov=depscan test
        devenv shell uv run depscan --config .config/depscan-dev.toml
    - name: Run pytest with uv
      run: |
        devenv shell uv run depscan --purl "pkg:pypi/requests@2.32.1"
        devenv shell uv run depscan --purl "pkg:pypi/reqwestss@0.1.0"
